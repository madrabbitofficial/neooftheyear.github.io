<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeoOfTheYear</title>

<style>

body{
font-family:Arial;
margin:0;
background:#2b0a3d;
color:white;
}

header{
background:#4c1a6a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
color:#d59cff;
}

header input{
padding:6px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,180px);
gap:20px;
}

.album{
cursor:pointer;
}

.album img{
width:180px;
height:180px;
object-fit:cover;
border-radius:6px;
}

.genre{
background:#7b4dff;
padding:4px 8px;
border-radius:4px;
margin:3px;
display:inline-block;
cursor:pointer;
font-size:12px;
}

.review{
background:#3c1856;
padding:10px;
margin-top:10px;
border-radius:6px;
}

button{
background:#9b6cff;
border:none;
padding:8px;
margin-top:6px;
cursor:pointer;
}

input,textarea{
width:100%;
margin-top:6px;
}

</style>
</head>

<body>

<header>

<h1>NeoOfTheYear</h1>

<input id="search" placeholder="Search albums">

</header>

<div class="container">

<div id="app"></div>

</div>

<script>

const albums=[

{title:"Some Rap Songs",artist:"Earl Sweatshirt",year:2018,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/8/8a/Some_Rap_Songs.jpg",score:90},

{title:"To Pimp a Butterfly",artist:"Kendrick Lamar",year:2015,genres:["Hip Hop","Jazz Rap"],cover:"https://upload.wikimedia.org/wikipedia/en/9/9c/To_Pimp_a_Butterfly.jpg",score:96},

{title:"Blonde",artist:"Frank Ocean",year:2016,genres:["R&B"],cover:"https://upload.wikimedia.org/wikipedia/en/a/a0/Blonde_-_Frank_Ocean.jpeg",score:95},

{title:"IGOR",artist:"Tyler, the Creator",year:2019,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/c/c3/Igor_-_Tyler%2C_the_Creator.jpg",score:89},

{title:"My Beautiful Dark Twisted Fantasy",artist:"Kanye West",year:2010,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/f/f0/My_Beautiful_Dark_Twisted_Fantasy.jpg",score:94},

{title:"good kid, m.A.A.d city",artist:"Kendrick Lamar",year:2012,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/9/93/KendrickGKMC.jpg",score:95},

{title:"Flower Boy",artist:"Tyler, the Creator",year:2017,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/c/c3/Flower_Boy.jpg",score:90},

{title:"Channel Orange",artist:"Frank Ocean",year:2012,genres:["R&B"],cover:"https://upload.wikimedia.org/wikipedia/en/2/28/Channel_ORANGE.jpg",score:92},

{title:"The College Dropout",artist:"Kanye West",year:2004,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/a/a3/Kanyewest_collegedropout.jpg",score:94},

{title:"Illmatic",artist:"Nas",year:1994,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/2/27/IllmaticNas.jpg",score:96},

{title:"The Blueprint",artist:"Jay-Z",year:2001,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/2/2c/The_Blueprint.png",score:93},

{title:"Enter the Wu-Tang (36 Chambers)",artist:"Wu-Tang Clan",year:1993,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/5/53/Wu-TangClanEntertheWu-Tangalbumcover.jpg",score:95},

{title:"DAMN.",artist:"Kendrick Lamar",year:2017,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/5/51/Kendrick_Lamar_-_Damn.png",score:90},

{title:"The Life of Pablo",artist:"Kanye West",year:2016,genres:["Hip Hop"],cover:"https://upload.wikimedia.org/wikipedia/en/4/4d/The_life_of_pablo_alternate.jpg",score:87}

]

/* REVIEWS */

function getReviews(id){
return JSON.parse(localStorage.getItem("rev"+id)||"[]")
}

function saveReviews(id,r){
localStorage.setItem("rev"+id,JSON.stringify(r))
}

/* HOME */

function home(){

let html="<div class='grid'>"

albums.forEach((a,i)=>{

html+=`
<div class="album" onclick="openAlbum(${i})">
<img src="${a.cover}">
<b>${a.title}</b><br>
${a.artist}
</div>
`

})

html+="</div>"

app.innerHTML=html

}

/* ALBUM PAGE */

function openAlbum(id){

let a=albums[id]

let genres=""

a.genres.forEach(g=>{
genres+=`<span class="genre" onclick="genre('${g}')">${g}</span>`
})

let reviews=getReviews(id)

let rhtml=""

reviews.forEach(r=>{
rhtml+=`
<div class="review">
<b onclick="user('${r.user}')">${r.user}</b><br>
${r.text}
</div>
`
})

app.innerHTML=`

<h1>${a.title}</h1>
<h3>${a.artist}</h3>

<img src="${a.cover}" width="300">

<p>${a.year}</p>

<div>${genres}</div>

<h2>Reviews</h2>

${rhtml}

<input id="user" placeholder="name">
<textarea id="text"></textarea>

<button onclick="review(${id})">Submit</button>

`

}

/* SUBMIT REVIEW */

function review(id){

let user=document.getElementById("user").value
let text=document.getElementById("text").value

let reviews=getReviews(id)

if(reviews.find(r=>r.user===user)){
alert("1 review per album")
return
}

reviews.push({user,text})

saveReviews(id,reviews)

openAlbum(id)

}

/* GENRE PAGE */

function genre(g){

let html="<h1>"+g+"</h1><div class='grid'>"

albums.forEach((a,i)=>{

if(a.genres.includes(g)){

html+=`
<div class="album" onclick="openAlbum(${i})">
<img src="${a.cover}">
${a.title}
</div>
`

}

})

html+="</div>"

app.innerHTML=html

}

/* USER PAGE */

function user(name){

let html="<h1>"+name+"</h1>"

albums.forEach((a,i)=>{

let reviews=getReviews(i)

reviews.forEach(r=>{

if(r.user===name){

html+=`
<div class="review">
<b>${a.title}</b><br>
${r.text}
</div>
`

}

})

})

app.innerHTML=html

}

/* SEARCH */

search.addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

let results=albums.filter(a=>

a.title.toLowerCase().includes(q) ||
a.artist.toLowerCase().includes(q)

)

let html="<div class='grid'>"

results.forEach((a,i)=>{

html+=`
<div class="album" onclick="openAlbum(${i})">
<img src="${a.cover}">
${a.title}
</div>
`

})

html+="</div>"

app.innerHTML=html

})

home()

</script>

</body>
</html>
